<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡我們 | Premium Fashion</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="Logo">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">首頁</a></li>
                <li><a href="about.html">公司簡介</a></li>
                <li><a href="casual.html">休閒服飾</a></li>
                <li><a href="formal.html">正式服飾</a></li>
                <li><a href="jewelry.html">飾品</a></li>
                <li><a href="accessories.html">配件</a></li>
                <li><a href="others.html">其它類</a></li>
                <li><a href="contact.html">聯絡我們</a></li>
            </ul>
        </div>
    </nav>

    <header class="about-hero" style="background: var(--secondary); height: 40vh;">
        <div class="hero-content">
            <h1>聯絡我們</h1>
            <p>我們隨時為您提供協助</p>
        </div>
    </header>

    <section class="container">
        <div class="contact-container">
            <div class="contact-info">
                <h3>與我們聯繫</h3>
                <div class="contact-item">
                    <p><strong>地址：</strong><br>台北市信義區時尚路 100 號</p>
                </div>
                <div class="contact-item">
                    <p><strong>電話：</strong><br>(02) 2345-6789</p>
                </div>
                <div class="contact-item">
                    <p><strong>信箱：</strong><br>service@premiumfashion.com</p>
                </div>
                <div class="contact-item">
                    <p><strong>營業時間：</strong><br>週一至週五 09:00 - 18:00</p>
                </div>
            </div>
            <div class="contact-form">
                <form>
                    <div>
                        <label for="name">姓名</label>
                        <input type="text" id="name" placeholder="請輸入您的姓名">
                    </div>
                    <div>
                        <label for="email">電子信箱</label>
                        <input type="email" id="email" placeholder="請輸入您的電子信箱">
                    </div>
                    <div>
                        <label for="message">您的訊息</label>
                        <textarea id="message" rows="5" placeholder="請輸入您想詢問的內容"></textarea>
                    </div>
                    <button type="submit" class="btn">發送訊息</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="copyright">
                &copy; 2026 Premium Fashion. All Rights Reserved.
            </div>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
